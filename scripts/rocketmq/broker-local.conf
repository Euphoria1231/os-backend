# Local RocketMQ broker configuration for the OA development environment.
# Use forward slashes so Java properties do not interpret Windows backslashes as escapes.

brokerClusterName = DefaultCluster
brokerName = Tang-computer
brokerId = 0

deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

storePathRootDir = D:/devtools/RocketMQ/store
storePathCommitLog = D:/devtools/RocketMQ/store/commitlog
