server:
  port: 9005

spring:
  application:
    name: intelligence-service
  datasource:
    url: ${OA_AI_DB_URL:jdbc:mysql://127.0.0.1:3306/oa_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${OA_AI_DB_USERNAME:root}
    password: ${OA_AI_DB_PASSWORD:${OA_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

oa:
  search:
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://127.0.0.1:9200}
      notice-index: ${ELASTICSEARCH_NOTICE_INDEX:oa-notices-v1}
      application-index: ${ELASTICSEARCH_APPLICATION_INDEX:oa-applications-v1}
      notice-alias: ${ELASTICSEARCH_NOTICE_ALIAS:oa-notices}
      application-alias: ${ELASTICSEARCH_APPLICATION_ALIAS:oa-applications}
      initialize: ${ELASTICSEARCH_INITIALIZE:true}
    events:
      enabled: ${SEARCH_INDEX_EVENTS_ENABLED:true}
      topic: ${SEARCH_INDEX_EVENTS_TOPIC:oa-search-index-events}
      consumer-group: ${SEARCH_INDEX_EVENTS_CONSUMER_GROUP:intelligence-search-index-consumer}

management:
  endpoints:
    web:
      exposure:
        include: health,info
