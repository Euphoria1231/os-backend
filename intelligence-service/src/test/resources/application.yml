spring:
  application:
    name: intelligence-service-test
  datasource:
    url: jdbc:h2:mem:oa_ai;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

oa:
  search:
    elasticsearch:
      initialize: false
    events:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
