spring:
  application:
    name: attendance-service-test
  datasource:
    url: jdbc:h2:mem:oa_attendance;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

attendance:
  clock:
    work-start-time: 09:00
    late-threshold-minutes: 0
    lock-ttl: PT10S
    completed-marker-ttl: PT36H
