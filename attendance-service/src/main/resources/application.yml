server:
  port: 9002

spring:
  application:
    name: attendance-service
  datasource:
    url: ${OA_ATTENDANCE_DB_URL:jdbc:mysql://127.0.0.1:3306/oa_attendance?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${OA_ATTENDANCE_DB_USERNAME:root}
    password: ${OA_ATTENDANCE_DB_PASSWORD:${OA_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:attendance-service-producer}

oa:
  notification:
    events:
      topic: ${PERSONAL_NOTIFICATION_EVENTS_TOPIC:oa-personal-notification-events}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

attendance:
  clock:
    work-start-time: ${ATTENDANCE_WORK_START_TIME:09:00}
    morning-end-time: ${ATTENDANCE_MORNING_END_TIME:12:00}
    afternoon-start-time: ${ATTENDANCE_AFTERNOON_START_TIME:14:00}
    work-end-time: ${ATTENDANCE_WORK_END_TIME:17:00}
    late-threshold-minutes: ${ATTENDANCE_LATE_THRESHOLD_MINUTES:0}
    lock-ttl: ${ATTENDANCE_LOCK_TTL:PT10S}
    completed-marker-ttl: ${ATTENDANCE_COMPLETED_MARKER_TTL:PT36H}
  geofence:
    center-longitude: ${ATTENDANCE_CENTER_LONGITUDE:119.411209}
    center-latitude: ${ATTENDANCE_CENTER_LATITUDE:26.022543}
    radius-meters: ${ATTENDANCE_RADIUS_METERS:500}

management:
  endpoints:
    web:
      exposure:
        include: health,info
