spring:
  application:
    name: flow-service-test
  datasource:
    url: jdbc:h2:mem:oa_flow;MODE=LEGACY;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 1000
            read-timeout: 1000
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

flowable:
  database-schema-update: true
  async-executor-activate: false
