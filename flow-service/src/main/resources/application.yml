server:
  port: 9003

spring:
  application:
    name: flow-service
  datasource:
    url: ${OA_FLOW_DB_URL:jdbc:mysql://127.0.0.1:3306/oa_flow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${OA_FLOW_DB_USERNAME:root}
    password: ${OA_FLOW_DB_PASSWORD:${OA_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
