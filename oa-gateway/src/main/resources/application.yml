server:
  port: 8088

spring:
  application:
    name: oa-gateway
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}
                allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
                allowed-headers: '*'
                exposed-headers: Authorization
                allow-credentials: true
                max-age: 3600
          routes:
            - id: user-openapi
              uri: lb://user-service
              predicates:
                - Path=/openapi/user
              filters:
                - SetPath=/v3/api-docs
            - id: attendance-openapi
              uri: lb://attendance-service
              predicates:
                - Path=/openapi/attendance
              filters:
                - SetPath=/v3/api-docs
            - id: flow-openapi
              uri: lb://flow-service
              predicates:
                - Path=/openapi/flow
              filters:
                - SetPath=/v3/api-docs
            - id: notice-openapi
              uri: lb://notice-service
              predicates:
                - Path=/openapi/notice
              filters:
                - SetPath=/v3/api-docs
            - id: intelligence-openapi
              uri: lb://intelligence-service
              predicates:
                - Path=/openapi/intelligence
              filters:
                - SetPath=/v3/api-docs
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/user/**
            - id: attendance-service
              uri: lb://attendance-service
              predicates:
                - Path=/api/attendance/**
            - id: flow-service
              uri: lb://flow-service
              predicates:
                - Path=/api/flow/**
            - id: notice-service
              uri: lb://notice-service
              predicates:
                - Path=/api/notices/**
            - id: intelligence-service
              uri: lb://intelligence-service
              predicates:
                - Path=/api/intelligence/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

security:
  jwt:
    secret: ${JWT_SECRET}
    validity: ${JWT_VALIDITY:PT2H}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: 用户与权限服务
        url: /openapi/user
      - name: 考勤服务
        url: /openapi/attendance
      - name: 审批服务
        url: /openapi/flow
      - name: 公告服务
        url: /openapi/notice
      - name: 搜索与智能平台服务
        url: /openapi/intelligence
