server:
  port: 9004

spring:
  application:
    name: notice-service
  datasource:
    url: ${OA_NOTICE_DB_URL:jdbc:mysql://127.0.0.1:3306/oa_notice?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${OA_NOTICE_DB_USERNAME:root}
    password: ${OA_NOTICE_DB_PASSWORD:${OA_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        namespace: ${NACOS_NAMESPACE:}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}

oa:
  notification:
    events:
      enabled: ${PERSONAL_NOTIFICATION_EVENTS_ENABLED:true}
      topic: ${PERSONAL_NOTIFICATION_EVENTS_TOPIC:oa-personal-notification-events}
      consumer-group: ${PERSONAL_NOTIFICATION_EVENTS_CONSUMER_GROUP:notice-personal-notification-consumer}
  search:
    events:
      topic: ${SEARCH_INDEX_EVENTS_TOPIC:oa-search-index-events}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
