server:
  port: 9004

spring:
  application:
    name: notice-service
  datasource:
    url: ${OA_NOTICE_DB_URL:jdbc:mysql://127.0.0.1:3306/oa_notice?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${OA_NOTICE_DB_USERNAME:root}
    password: ${OA_NOTICE_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
